{% extends "base.html" %}
{% load i18n %}

{% block title %}Paramètres — OpenASBL{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="card-title h4 mb-4">{% trans "Paramètres de l'ASBL" %}</h1>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success">Enregistrer</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
