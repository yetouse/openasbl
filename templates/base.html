{% load static i18n %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OpenASBL{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/htmx.min.js' %}" defer></script>
</head>
<body>
    {% include "navbar.html" %}
    <main class="container py-4">
        {% include "partials/messages.html" %}
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center py-3 mt-4 border-top">
        <div class="d-flex align-items-center justify-content-center gap-2">
            <img src="{% static 'img/logo-openasbl.png' %}" alt="OpenASBL" style="height: 28px;">
            <span class="text-muted small">Propulsé par <strong>OpenASBL</strong> — Comptabilité simplifiée pour ASBL</span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
