{% load static i18n %}
<!DOCTYPE html>
<html lang="fr">
<head>

    <title>{% block title %}OpenASBL{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1Vxl2aek2Ggm3SVE4ow2PqFMahCOhp" crossorigin="anonymous">
